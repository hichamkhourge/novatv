; Appended to the [www] pool — loaded as zzz-streaming.conf so it
; processes AFTER the default www.conf (alphabetically last).
[www]
; Listen on all interfaces so nginx (a separate container) can connect via TCP.
; The default php:fpm-alpine image only listens on 127.0.0.1:9000 which blocks
; cross-container FastCGI connections.
listen = 0.0.0.0:9000

; Never forcefully kill a running request — IPTV streams can last hours.
request_terminate_timeout = 0
