log_format live_debug '$remote_addr - [$time_local] "$request" '
    'status=$status uri="$uri" request_uri="$request_uri" '
    'upstream_addr="$upstream_addr" upstream_status="$upstream_status"';

map $stream_proxy_port $stream_proxy_port_suffix {
    default :$stream_proxy_port;
    ''      '';
}

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;

    # Docker's embedded DNS resolves internal service names and external IPTV hosts.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Re-resolve the PHP-FPM service after container restarts.
    set $fpm novatv-fpm;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires max;
        log_not_found off;
        access_log off;
        try_files $uri @php;
    }

    location @php {
        try_files $uri /index.php?$query_string;
    }

    location = /nginx-test {
        return 200 "Nginx is working!\n";
        add_header Content-Type text/plain;
    }

    # PHP authenticates /live/... and returns X-Accel-Redirect to /_proxy_stream/...
    # nginx then proxies the stream body directly from the provider.
    location ^~ /live/ {
        access_log /var/log/nginx/live_access.log live_debug;

        include fastcgi_params;
        fastcgi_pass $fpm:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param HTTPS                  $https if_not_empty;

        fastcgi_read_timeout    120;
        fastcgi_connect_timeout 10;
        fastcgi_send_timeout    120;
    }

    location ~ ^/_proxy_stream/(?<stream_proxy_scheme>https?)/(?<stream_proxy_host>[^/:]+)(?::(?<stream_proxy_port>\d+))?(?<stream_proxy_path>/.*)$ {
        internal;

        proxy_pass $stream_proxy_scheme://$stream_proxy_host$stream_proxy_port_suffix$stream_proxy_path$is_args$args;
        proxy_http_version      1.1;
        proxy_cache             off;
        proxy_buffering         off;
        proxy_request_buffering off;

        proxy_set_header Host               $stream_proxy_host$stream_proxy_port_suffix;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         '';
        proxy_ssl_server_name on;
        proxy_ssl_name        $stream_proxy_host;

        proxy_connect_timeout 15s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # Kept for debugging while migrating away from auth_request.
    location = /api/auth/stream {
        internal;
        include fastcgi_params;
        fastcgi_pass $fpm:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param SCRIPT_NAME     /index.php;
        fastcgi_param PHP_SELF        /index.php;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_param DOCUMENT_URI    $uri;
        fastcgi_param REQUEST_URI     $uri$is_args$args;
        fastcgi_param QUERY_STRING    $query_string;

        fastcgi_connect_timeout 5s;
        fastcgi_read_timeout    10s;
    }

    location ~ ^/(get\.php|player_api\.php) {
        include fastcgi_params;
        fastcgi_pass $fpm:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param HTTPS                  $https if_not_empty;

        fastcgi_read_timeout    120;
        fastcgi_connect_timeout 10;
        fastcgi_send_timeout    120;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass $fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param HTTPS                  $https if_not_empty;

        fastcgi_read_timeout      300;
        fastcgi_connect_timeout   300;
        fastcgi_send_timeout      300;
        fastcgi_buffer_size       128k;
        fastcgi_buffers           4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
