server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;

    # 127.0.0.11 = Docker's embedded DNS — resolves internal service names like "app".
    # valid=5s forces re-resolution so a restarted app container (with a new IP) is picked up.
    # 8.8.8.8 is kept as fallback for external IPTV URLs used in /live/ proxy_pass.
    resolver 127.0.0.11 8.8.8.8 valid=5s ipv6=off;

    # Variable forces nginx to re-resolve "app" via the resolver above on every request,
    # instead of caching the IP at startup (which breaks when app container restarts).
    set $fpm novatv-fpm;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires max;
        log_not_found off;
        access_log off;
        try_files $uri @php;
    }

    location @php {
        try_files $uri /index.php?$query_string;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location = /nginx-test {
        return 200 "Nginx is working!\n";
        add_header Content-Type text/plain;
    }

    # ── IPTV /live/ stream auth ─────────────────────────────────────────────
    location ^~ /live/ {
        auth_request /api/auth/stream;
        auth_request_set $upstream_url $upstream_http_x_upstream_url;

        # $upstream_url is an external URL resolved at runtime — resolver directive above handles this
        proxy_pass $upstream_url;
        proxy_http_version 1.1;
        proxy_cache off;
        proxy_buffering off;

        proxy_set_header Host $upstream_http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;

        # Pass stream identification headers to auth endpoint
        if ($request_uri ~ ^/live/([^/]+)/([^/]+)/(.+)\.ts$) {
            set $stream_username $1;
            set $stream_password $2;
            set $stream_id $3;
        }
        proxy_set_header X-Stream-Username $stream_username;
        proxy_set_header X-Stream-Password $stream_password;
        proxy_set_header X-Stream-Id $stream_id;
    }

    # ── Auth request handler (internal) ───────────────────────────────
    location = /api/auth/stream {
        include fastcgi_params;
        fastcgi_pass $fpm:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        fastcgi_param HTTP_X_STREAM_USERNAME $http_x_stream_username;
        fastcgi_param HTTP_X_STREAM_PASSWORD $http_x_stream_password;
        fastcgi_param HTTP_X_STREAM_ID $http_x_stream_id;

        fastcgi_connect_timeout 10;
        fastcgi_read_timeout 10;
    }

    # ── IPTV playlist & Xtream API ────────────────────────────────────────────
    location ~ ^/(get\.php|player_api\.php) {
        include fastcgi_params;
        fastcgi_pass $fpm:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param HTTPS                  $https if_not_empty;

        fastcgi_read_timeout    120;
        fastcgi_connect_timeout 10;
        fastcgi_send_timeout    120;
    }

    # ── All other routes → Laravel ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM handler ───────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass $fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param HTTPS                  $https if_not_empty;

        fastcgi_read_timeout         300;
        fastcgi_connect_timeout      300;
        fastcgi_send_timeout         300;
        fastcgi_buffer_size          128k;
        fastcgi_buffers              4 256k;
        fastcgi_busy_buffers_size    256k;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

