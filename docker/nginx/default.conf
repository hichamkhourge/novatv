server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream novatv-applicaton-ncntbv-app-1;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires max;
        log_not_found off;
        access_log off;
        try_files $uri @php;
    }

    location @php {
        try_files $uri /index.php?$query_string;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location = /nginx-test {
        return 200 "Nginx is working!\n";
        add_header Content-Type text/plain;
    }

    # ── IPTV playlist & Xtream API ────────────────────────────────────────────
    location ~ ^/(get\.php|player_api\.php) {
        include fastcgi_params;
        fastcgi_pass $upstream:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param HTTPS                  $https if_not_empty;

        fastcgi_read_timeout    120;
        fastcgi_connect_timeout 10;
        fastcgi_send_timeout    120;
    }

    # ── Stream proxy (/live/user/pass/id.ts) ──────────────────────────────────
    # PHP handles auth + cURL streaming.
    # cURL follows upstream redirects server-side so IP-locked tokens stay valid.
    # fastcgi_buffering off sends each chunk to the client immediately.
    location ~ ^/live/ {
        include fastcgi_params;
        fastcgi_pass $upstream:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param HTTPS                  $https if_not_empty;

        fastcgi_buffering       off;
        fastcgi_keep_conn       on;
        fastcgi_read_timeout    3600;
        fastcgi_send_timeout    3600;
        fastcgi_connect_timeout 10;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        gzip off;
    }

    # ── All other routes → Laravel ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM handler ───────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass $upstream:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param HTTPS                  $https if_not_empty;

        fastcgi_read_timeout         300;
        fastcgi_connect_timeout      300;
        fastcgi_send_timeout         300;
        fastcgi_buffer_size          128k;
        fastcgi_buffers              4 256k;
        fastcgi_busy_buffers_size    256k;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
