server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;

    # Enable error logging
    error_log /var/log/nginx/error.log debug;
    access_log /var/log/nginx/access.log;

    # Debug endpoint to test nginx
    location = /nginx-test {
        return 200 "Nginx is working!\n";
        add_header Content-Type text/plain;
    }

    # Debug endpoint to test PHP-FPM
    location = /phpinfo-test {
        default_type text/html;
        return 200 '<?php phpinfo(); ?>';
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # IPTV API routes - route through Laravel instead of treating as real PHP files
    location ~ ^/(get\.php|player_api\.php) {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 300;
    }

    location ~ /\.ht {
        deny all;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
