server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;

    # 127.0.0.11 = Docker's embedded DNS — resolves internal service names like "app".
    # valid=5s forces re-resolution so a restarted app container (with a new IP) is picked up.
    # 8.8.8.8 is kept as fallback for external IPTV URLs used in /live/ proxy_pass.
    # 127.0.0.11 = Docker's embedded DNS. Handles both internal aliases (novatv-fpm)
    # AND forwards external queries (for IPTV URLs in /live/). No public DNS needed.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Variable forces nginx to re-resolve "app" via the resolver above on every request,
    # instead of caching the IP at startup (which breaks when app container restarts).
    set $fpm novatv-fpm;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Static assets ─────────────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires max;
        log_not_found off;
        access_log off;
        try_files $uri @php;
    }

    location @php {
        try_files $uri /index.php?$query_string;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location = /nginx-test {
        return 200 "Nginx is working!\n";
        add_header Content-Type text/plain;
    }

    # ── IPTV /live/ streams ─────────────────────────────────────────────────
    # Credentials are extracted from the URI via nginx map directives in maps.conf.
    # Passed to PHP auth endpoint as query params — nginx supports variables in
    # auth_request URIs and forwards the query string via fastcgi QUERY_STRING.
    location ^~ /live/ {
        auth_request /api/auth/stream?u=$stream_username&p=$stream_password&id=$stream_id;
        auth_request_set $upstream_url $upstream_http_x_upstream_url;

        # nginx proxies directly to the CDN URL returned by PHP auth.
        # PHP is NOT involved in streaming — only in the 1-time auth check.
        proxy_pass $upstream_url;
        proxy_http_version 1.1;
        proxy_cache    off;
        proxy_buffering off;

        proxy_set_header Host               $proxy_host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         '';
        proxy_ssl_server_name on;
        proxy_ssl_name        $proxy_host;

        proxy_connect_timeout 15s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ── Auth endpoint (internal — only reachable via auth_request) ────────────
    # Credentials arrive as query params: ?u=username&p=password&id=stream_id
    # PHP reads them via $request->query('u') etc.
    location = /api/auth/stream {
        internal;
        include fastcgi_params;
        fastcgi_pass $fpm:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_param QUERY_STRING    $query_string;

        fastcgi_connect_timeout 5s;
        fastcgi_read_timeout    10s;
    }

    # ── IPTV playlist & Xtream API ────────────────────────────────────────────
    location ~ ^/(get\.php|player_api\.php) {
        include fastcgi_params;
        fastcgi_pass $fpm:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param HTTPS                  $https if_not_empty;

        fastcgi_read_timeout    120;
        fastcgi_connect_timeout 10;
        fastcgi_send_timeout    120;
    }

    # ── All other routes → Laravel ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM handler ───────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass $fpm:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST  $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT  $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param HTTPS                  $https if_not_empty;

        fastcgi_read_timeout         300;
        fastcgi_connect_timeout      300;
        fastcgi_send_timeout         300;
        fastcgi_buffer_size          128k;
        fastcgi_buffers              4 256k;
        fastcgi_busy_buffers_size    256k;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
