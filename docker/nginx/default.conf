server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;

    # Docker internal DNS — use full container name to avoid
    # collision with other services also named 'app' on dokploy-network
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream novatv-applicaton-ncntbv-app-1;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ---------------------------------
    # Basic test (nginx only, no PHP)
    # ---------------------------------
    location = /nginx-test {
        return 200 "Nginx is working!\n";
        add_header Content-Type text/plain;
    }

    # ---------------------------------
    # Static assets — serve directly, no PHP fallback
    # ---------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires max;
        log_not_found off;
        access_log off;
        try_files $uri =404;
    }

    # ---------------------------------
    # IPTV special routes
    # ---------------------------------
    location ~ ^/(get\.php|player_api\.php) {
        try_files $uri /index.php?$query_string;
    }

    # ---------------------------------
    # Laravel main routing
    # ---------------------------------
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ---------------------------------
    # PHP-FPM handling
    # ---------------------------------
    location ~ \.php$ {
        # Security: only allow existing files
        try_files $uri =404;

        include fastcgi_params;

        fastcgi_pass $upstream:9000;
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        fastcgi_read_timeout    300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout    300;

        fastcgi_buffer_size          128k;
        fastcgi_buffers              4 256k;
        fastcgi_busy_buffers_size    256k;
    }

    # ---------------------------------
    # Security — block hidden files
    # ---------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
