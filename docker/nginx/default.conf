# Extract stream parameters from URI using map (global scope)
# This ensures variables are available in auth_request subrequest context
map $request_uri $stream_username {
    ~^/live/([^/]+)/([^/]+)/(.+)$ $1;
    default "";
}

map $request_uri $stream_password {
    ~^/live/([^/]+)/([^/]+)/(.+)$ $2;
    default "";
}

map $request_uri $stream_id_raw {
    ~^/live/([^/]+)/([^/]+)/(.+)$ $3;
    default "";
}

# Remove file extension from stream ID (.ts or .m3u8)
map $stream_id_raw $stream_id_clean {
    ~^(.+)\.(ts|m3u8)$ $1;
    default $stream_id_raw;
}

# Custom log format for debugging stream proxy
log_format stream_debug '$remote_addr - [$time_local] '
                        '"$request" $status '
                        'user=$stream_username '
                        'stream_id=$stream_id_clean '
                        'upstream=$upstream_scheme://$upstream_host:$upstream_port$upstream_path '
                        'bytes=$bytes_sent';

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 100M;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream novatv-applicaton-ncntbv-app-1;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ============================================
    # NGINX-LEVEL STREAM PROXY (Reverse Proxy)
    # ============================================
    # All stream traffic is handled directly by nginx for maximum performance
    # PHP is only used for authentication via auth_request subrequest

    # Main stream endpoint: /live/{username}/{password}/{streamId}
    # Note: Variables are extracted via map directives (global scope)
    location ~ ^/live/([^/]+)/([^/]+)/(.+)$ {
        # Authentication subrequest to PHP
        # This calls /api/auth/stream which validates credentials and returns upstream URL components
        auth_request /auth-stream;

        # Capture upstream URL components from auth response headers
        auth_request_set $upstream_scheme $upstream_http_x_upstream_scheme;
        auth_request_set $upstream_host $upstream_http_x_upstream_host;
        auth_request_set $upstream_port $upstream_http_x_upstream_port;
        auth_request_set $upstream_path $upstream_http_x_upstream_path;
        auth_request_set $auth_status $upstream_status;

        # Handle authentication errors
        error_page 403 = @stream_forbidden;
        error_page 404 = @stream_not_found;
        error_page 429 = @stream_rate_limit;
        error_page 500 502 503 504 = @stream_error;

        # Debug: Log stream request details with custom format
        # To view: docker-compose exec nginx tail -f /var/log/nginx/stream_debug.log
        access_log /var/log/nginx/stream_debug.log stream_debug;

        # Proxy to upstream URL (constructed from components)
        # Format: scheme://host:port/path
        # Example: http://example.com:8080/path/stream.m3u8
        proxy_pass $upstream_scheme://$upstream_host:$upstream_port$upstream_path;

        # HTTP/1.1 with keep-alive for better performance
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Disable buffering for live streams (reduces latency)
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_ignore_client_abort off;

        # Timeouts optimized for streaming
        proxy_connect_timeout 10s;      # Initial connection to upstream
        proxy_send_timeout 60s;         # Sending data to upstream
        proxy_read_timeout 300s;        # Reading stream (5 minutes)

        # Forward headers to upstream server
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header User-Agent $http_user_agent;
        proxy_set_header Range $http_range;
        proxy_set_header Referer $http_referer;

        # Pass through content headers from upstream
        proxy_pass_header Content-Type;
        proxy_pass_header Content-Length;
        proxy_pass_header Accept-Ranges;
        proxy_pass_header Content-Range;

        # Add CORS headers for web players
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, User-Agent" always;

        # Logging for stream access
        access_log /var/log/nginx/stream_access.log;
        error_log /var/log/nginx/stream_error.log;
    }

    # Alternative stream endpoint: /{username}/{password}/{streamId}
    # Redirect to /live/ endpoint for consistency
    location ~ ^/([^/]+)/([^/]+)/(.+\.(ts|m3u8))$ {
        rewrite ^/([^/]+)/([^/]+)/(.+)$ /live/$1/$2/$3 last;
    }

    # Internal authentication endpoint (called by nginx auth_request)
    location = /auth-stream {
        internal;  # Only accessible via auth_request, not from external clients

        # Pass to PHP-FPM via FastCGI
        include fastcgi_params;
        fastcgi_pass $upstream:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Pass stream info to PHP via custom headers (from global map variables)
        fastcgi_param HTTP_X_STREAM_USERNAME $stream_username;
        fastcgi_param HTTP_X_STREAM_PASSWORD $stream_password;
        fastcgi_param HTTP_X_STREAM_ID $stream_id_clean;
        fastcgi_param REQUEST_URI /api/auth/stream;

        # Fast timeout for authentication (should be quick)
        fastcgi_connect_timeout 5s;
        fastcgi_send_timeout 5s;
        fastcgi_read_timeout 5s;
    }

    # Error handlers for stream proxy
    location @stream_forbidden {
        default_type text/plain;
        return 403 "Access Denied: Invalid credentials or expired account\n";
    }

    location @stream_not_found {
        default_type text/plain;
        return 404 "Stream Not Found: Invalid stream ID\n";
    }

    location @stream_rate_limit {
        default_type text/plain;
        return 429 "Too Many Connections: Maximum concurrent streams exceeded\n";
    }

    location @stream_error {
        default_type text/plain;
        return 502 "Upstream Error: Failed to connect to stream source\n";
    }

    # ============================================
    # END STREAM PROXY CONFIGURATION
    # ============================================

    location = /nginx-test {
        return 200 "Nginx is working!\n";
        add_header Content-Type text/plain;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        expires max;
        log_not_found off;
        access_log off;
        try_files $uri @php;
    }

    location @php {
        try_files $uri /index.php?$query_string;
    }

    location ~ ^/(get\.php|player_api\.php) {
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_pass $upstream:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        # Forward proxy headers to PHP-FPM for Laravel to detect HTTPS correctly
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_FORWARDED_HOST $http_x_forwarded_host;
        fastcgi_param HTTP_X_FORWARDED_PORT $http_x_forwarded_port;
        fastcgi_param HTTP_X_FORWARDED_FOR $http_x_forwarded_for;
        fastcgi_param HTTPS $https if_not_empty;

        fastcgi_read_timeout    300;
        fastcgi_connect_timeout 300;
        fastcgi_send_timeout    300;
        fastcgi_buffer_size          128k;
        fastcgi_buffers              4 256k;
        fastcgi_busy_buffers_size    256k;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
