# ── Stream credential extraction ──────────────────────────────────────────────
# These map directives live in the http {} context (via conf.d/ include).
# map variables are lazily evaluated per-request and ARE available in
# auth_request subrequests — unlike variables set with `set` inside locations.
#
# They extract the three parts of: /live/{username}/{password}/{stream_id}

map $uri $stream_username {
    ~^/live/(?<val>[^/]+)/[^/]+/ $val;
    default '';
}

map $uri $stream_password {
    ~^/live/[^/]+/(?<val>[^/]+)/ $val;
    default '';
}

map $uri $stream_id {
    ~^/live/[^/]+/[^/]+/(?<val>[^/?]+) $val;
    default '';
}
