services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
            target: app
        restart: unless-stopped
        environment:
            - APP_NAME=IPTVProvider
            - APP_ENV=production
            - APP_KEY=${APP_KEY}
            - APP_DEBUG=false
            - APP_URL=${APP_URL:-http://localhost}
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=${DB_DATABASE}
            - DB_USERNAME=${DB_USERNAME}
            - DB_PASSWORD=${DB_PASSWORD}
            - REDIS_CLIENT=predis
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=null
            - CACHE_DRIVER=redis
            - SESSION_DRIVER=redis
            - QUEUE_CONNECTION=redis
            - LOG_CHANNEL=stack
        volumes:
            - storage_data:/var/www/html/storage
            - bootstrap_cache:/var/www/html/bootstrap/cache
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_started
        healthcheck:
            test: ["CMD-SHELL", "pidof php-fpm || exit 1"]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 120s
        networks:
            - iptv_network
        labels:
            - traefik.enable=false

    nginx:
        build:
            context: .
            dockerfile: Dockerfile
            target: nginx        # <-- use the nginx stage
        restart: unless-stopped
        expose:
            - "80"
        volumes:
            - storage_data:/var/www/html/storage
            - bootstrap_cache:/var/www/html/bootstrap/cache
        depends_on:
            app:
                condition: service_healthy
        healthcheck:
            test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
            interval: 10s
            timeout: 3s
            retries: 3
            start_period: 30s
        networks:
            - iptv_network
            - dokploy-network
        labels:
            - traefik.enable=true
            - traefik.docker.network=dokploy-network

            # Main Laravel site
            - traefik.http.routers.laravel.rule=Host(`novatv.novadevlabs.com`) && PathPrefix(`/`)
            - traefik.http.routers.laravel.entrypoints=websecure
            - traefik.http.routers.laravel.tls=true
            - traefik.http.routers.laravel.tls.certresolver=letsencrypt
            - traefik.http.services.laravel.loadbalancer.server.port=80

            # Redirect HTTP -> HTTPS
            - traefik.http.routers.laravel-http.rule=Host(`novatv.novadevlabs.com`)
            - traefik.http.routers.laravel-http.entrypoints=web
            - traefik.http.routers.laravel-http.middlewares=https-redirect
            - traefik.http.middlewares.https-redirect.redirectscheme.scheme=https
            - traefik.http.middlewares.https-redirect.redirectscheme.permanent=true

            # nginx-test router (bypasses Laravel)
            - traefik.http.routers.nginx-test.rule=Host(`novatv.novadevlabs.com`) && Path(`/nginx-test`)
            - traefik.http.routers.nginx-test.entrypoints=websecure
            - traefik.http.routers.nginx-test.tls=true
            - traefik.http.routers.nginx-test.tls.certresolver=letsencrypt
            - traefik.http.services.nginx-test.loadbalancer.server.port=80

    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 10s
        networks:
            - iptv_network

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        networks:
            - iptv_network

    queue:
        build:
            context: .
            dockerfile: Dockerfile
            target: app
        restart: unless-stopped
        command: php artisan queue:work --sleep=3 --tries=3
        environment:
            - APP_NAME=IPTVProvider
            - APP_ENV=production
            - APP_KEY=${APP_KEY}
            - APP_DEBUG=false
            - APP_URL=${APP_URL:-http://localhost}
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=${DB_DATABASE}
            - DB_USERNAME=${DB_USERNAME}
            - DB_PASSWORD=${DB_PASSWORD}
            - REDIS_CLIENT=predis
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=null
            - QUEUE_CONNECTION=redis
            - LOG_CHANNEL=stack
        volumes:
            - storage_data:/var/www/html/storage
            - bootstrap_cache:/var/www/html/bootstrap/cache
        depends_on:
            app:
                condition: service_started
        networks:
            - iptv_network

    scheduler:
        build:
            context: .
            dockerfile: Dockerfile
            target: app
        restart: unless-stopped
        command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction && sleep 60; done"
        environment:
            - APP_NAME=IPTVProvider
            - APP_ENV=production
            - APP_KEY=${APP_KEY}
            - APP_DEBUG=false
            - APP_URL=${APP_URL:-http://localhost}
            - DB_CONNECTION=pgsql
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_DATABASE=${DB_DATABASE}
            - DB_USERNAME=${DB_USERNAME}
            - DB_PASSWORD=${DB_PASSWORD}
            - REDIS_CLIENT=predis
            - REDIS_HOST=redis
            - REDIS_PORT=6379
            - REDIS_PASSWORD=null
            - QUEUE_CONNECTION=redis
            - LOG_CHANNEL=stack
        volumes:
            - storage_data:/var/www/html/storage
            - bootstrap_cache:/var/www/html/bootstrap/cache
        depends_on:
            app:
                condition: service_started
        networks:
            - iptv_network

volumes:
    postgres_data:
    redis_data:
    storage_data:
    bootstrap_cache:

networks:
    iptv_network:
        driver: bridge
    dokploy-network:
        external: true
