version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iptv_app
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=redis
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - storage_data:/var/www/html/storage
    depends_on:
      - postgres
      - redis
    networks:
      - iptv_network

  nginx:
    image: nginx:alpine
    container_name: iptv_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - storage_data:/var/www/html/storage
    depends_on:
      - app
    networks:
      - iptv_network

  postgres:
    image: postgres:16-alpine
    container_name: iptv_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iptv_network

  redis:
    image: redis:7-alpine
    container_name: iptv_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - iptv_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iptv_queue
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - storage_data:/var/www/html/storage
    depends_on:
      - postgres
      - redis
    networks:
      - iptv_network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iptv_scheduler
    restart: unless-stopped
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction && sleep 60; done"
    environment:
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - storage_data:/var/www/html/storage
    depends_on:
      - postgres
      - redis
    networks:
      - iptv_network

volumes:
  postgres_data:
  redis_data:
  storage_data:

networks:
  iptv_network:
    driver: bridge
