# Docker Compose override for local development
#
# Usage: docker-compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# This file adds port bindings for local development
# Do NOT use this on Dokploy - it will conflict with Traefik

version: '3.8'
services:
  nginx:
    ports:
      - "${APP_PORT:-8080}:80"
